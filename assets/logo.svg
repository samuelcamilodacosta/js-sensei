<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="js-sensei logo — ninja sensei meets JavaScript">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="55%" stop-color="#243b5c"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="flame" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded badge background -->
  <rect width="120" height="120" rx="22" fill="url(#sky)"/>

  <!-- Subtle smoke / mist (substitution jutsu vibe) -->
  <ellipse cx="28" cy="88" rx="18" ry="6" fill="#334155" opacity="0.35"/>
  <ellipse cx="92" cy="84" rx="14" ry="5" fill="#334155" opacity="0.25"/>

  <!-- Ninja headband plate -->
  <rect x="18" y="22" width="84" height="28" rx="6" fill="url(#metal)" stroke="#334155" stroke-width="1.2"/>
  <rect x="20" y="24" width="80" height="24" rx="5" fill="#1e293b" opacity="0.55"/>

  <!-- Konoha-inspired leaf (stylized, original geometry) -->
  <g transform="translate(60 36) scale(0.42)" filter="url(#glow)">
    <path
      d="M0 -28 C18 -22 32 -8 28 12 C22 28 8 34 0 38 C-8 34 -22 28 -28 12 C-32 -8 -18 -22 0 -28 Z"
      fill="url(#leaf)"
      stroke="#166534"
      stroke-width="2"
    />
    <path d="M0 -20 L0 30" stroke="#14532d" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M0 -4 C-14 2 -20 14 -16 22" fill="none" stroke="#14532d" stroke-width="2" stroke-linecap="round"/>
    <path d="M0 -4 C14 2 20 14 16 22" fill="none" stroke="#14532d" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Headband text: JS -->
  <text
    x="60"
    y="41"
    text-anchor="middle"
    font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
    font-size="15"
    font-weight="800"
    fill="#f8fafc"
    letter-spacing="1"
  >JS</text>

  <!-- Shuriken (stylized 4-point) -->
  <g transform="translate(94 26) rotate(18)" opacity="0.85">
    <circle r="2.2" fill="#cbd5e1"/>
    <path d="M0 -9 L2.2 -2.2 L9 0 L2.2 2.2 L0 9 L-2.2 2.2 L-9 0 L-2.2 -2.2 Z" fill="#94a3b8" stroke="#64748b" stroke-width="0.6"/>
  </g>
  <g transform="translate(26 26) rotate(-24)" opacity="0.7">
    <circle r="1.8" fill="#cbd5e1"/>
    <path d="M0 -7 L1.8 -1.8 L7 0 L1.8 1.8 L0 7 L-1.8 1.8 L-7 0 L-1.8 -1.8 Z" fill="#64748b"/>
  </g>

  <!-- Scroll curl behind title area -->
  <path
    d="M14 58 Q14 52 22 52 L98 52 Q106 52 106 58 L106 92 Q106 98 98 98 L22 98 Q14 98 14 92 Z"
    fill="#fef3c7"
    opacity="0.08"
    stroke="#fbbf24"
    stroke-width="0.8"
    stroke-opacity="0.35"
  />

  <!-- Flame accent (chakra / ninja energy) -->
  <path
    d="M60 54 C56 62 52 66 54 74 C58 68 60 68 60 76 C60 68 62 68 66 74 C68 66 64 62 60 54 Z"
    fill="url(#flame)"
    opacity="0.9"
  />

  <!-- SENSEI — master / teacher -->
  <text
    x="60"
    y="88"
    text-anchor="middle"
    font-family="system-ui, -apple-system, Segoe UI, sans-serif"
    font-size="13"
    font-weight="700"
    fill="#f97316"
    letter-spacing="3"
  >SENSEI</text>

  <!-- Kunai silhouette -->
  <g transform="translate(18 72) rotate(-35)" opacity="0.55">
    <path d="M0 0 L14 0 L16 2 L0 10 Z" fill="#64748b"/>
    <rect x="-3" y="-1.5" width="4" height="3" rx="0.5" fill="#475569"/>
  </g>
</svg>
