name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      - run: node examples/benchmarks/some-vs-filter.js

      - run: node examples/benchmarks/duplicate-skus.js
